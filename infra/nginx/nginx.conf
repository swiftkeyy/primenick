user nginx;
worker_processes auto;
pcre_jit on;
worker_rlimit_nofile 200000;

events {
  worker_connections 16384;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  charset utf-8;

  log_format json_combined escape=json '{"ts":"$time_iso8601","remote_addr":"$remote_addr","xff":"$http_x_forwarded_for","cf":"$http_cf_connecting_ip","method":"$request_method","uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,"rt":$request_time,"urt":"$upstream_response_time","ua":"$http_user_agent","rid":"$request_id"}';
  access_log /var/log/nginx/access.log json_combined buffer=512k flush=2s;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 20s;
  keepalive_requests 1000;
  client_body_timeout 8s;
  client_header_timeout 8s;
  send_timeout 8s;
  reset_timedout_connection on;

  client_max_body_size 256k;
  client_body_buffer_size 32k;
  large_client_header_buffers 4 8k;

  gzip off;

  map $http_upgrade $connection_upgrade { default upgrade; '' close; }
  map $http_x_telegram_bot_api_secret_token $tg_secret_present { default 1; '' 0; }

  limit_req_zone $binary_remote_addr zone=perip:64m rate=20r/s;
  limit_req_zone $http_x_telegram_bot_api_secret_token zone=telegram_secret:8m rate=150r/s;
  limit_conn_zone $binary_remote_addr zone=conn_per_ip:64m;

  upstream bot_backend {
    least_conn;
    server bot:8080 max_fails=3 fail_timeout=10s;
    keepalive 128;
  }

  include /etc/nginx/conf.d/*.conf;
}
